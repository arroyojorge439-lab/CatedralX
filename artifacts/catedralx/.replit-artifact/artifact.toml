kind = "web"
previewPath = "/"
title = "CATEDRALX — CHALAMANDRA LABS"
version = "1.0.0"
id = "artifacts/catedralx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23379

[services.development]
run = "pnpm --filter @workspace/catedralx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/catedralx", "run", "build" ]
publicDir = "artifacts/catedralx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23379"
BASE_PATH = "/"
